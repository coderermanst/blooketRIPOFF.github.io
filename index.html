<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PeerBlocks – P2P Block Race (PeerJS)</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #111827;
      color: #e5e7eb;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    header {
      text-align: center;
      padding: 1rem;
    }
    h1 {
      margin: 0.2rem 0;
      font-size: 1.8rem;
      color: #fbbf24;
    }
    main {
      width: 100%;
      max-width: 800px;
      padding: 1rem;
      box-sizing: border-box;
    }
    .card {
      background: #1f2937;
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }
    label {
      font-size: 0.9rem;
      color: #9ca3af;
    }
    input, select {
      padding: 0.4rem 0.6rem;
      border-radius: 0.4rem;
      border: 1px solid #374151;
      background: #111827;
      color: #e5e7eb;
      outline: none;
    }
    input:focus {
      border-color: #fbbf24;
    }
    button {
      padding: 0.45rem 0.9rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: #fbbf24;
      color: #111827;
      transition: transform 0.05s ease, box-shadow 0.05s ease, background 0.15s;
    }
    button:hover {
      background: #facc15;
    }
    button:active {
      transform: translateY(1px);
      box-shadow: 0 2px 6px rgba(0,0,0,0.5) inset;
    }
    button[disabled] {
      opacity: 0.5;
      cursor: default;
      transform: none;
      box-shadow: none;
    }
    .status {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-top: 0.25rem;
      min-height: 1.2em;
    }
    .pill {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.75rem;
      background: #111827;
      border: 1px solid #374151;
      color: #9ca3af;
      margin-left: 0.25rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .block {
      background: #4b5563;
      border-radius: 0.75rem;
      padding: 1.5rem 0.5rem;
      text-align: center;
      cursor: pointer;
      font-weight: 700;
      font-size: 1.1rem;
      color: #e5e7eb;
      position: relative;
      overflow: hidden;
      transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.15s;
    }
    .block:hover {
      background: #6b7280;
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
      transform: translateY(-2px);
    }
    .block.correct {
      background: #16a34a;
    }
    .block.wrong {
      background: #b91c1c;
    }
    .block span.label {
      display: block;
      font-size: 0.8rem;
      color: #d1d5db;
      margin-bottom: 0.25rem;
    }
    .block span.value {
      font-size: 1.4rem;
    }
    .question {
      font-size: 1.1rem;
      margin-top: 0.5rem;
      color: #e5e7eb;
    }
    .question span.tag {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      margin-right: 0.4rem;
    }
    .scoreboard {
      display: flex;
      justify-content: space-between;
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }
    .score {
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      background: #111827;
      border: 1px solid #374151;
    }
    .you {
      color: #22c55e;
    }
    .them {
      color: #60a5fa;
    }
    .small {
      font-size: 0.8rem;
      color: #9ca3af;
    }
    .hidden {
      display: none !important;
    }
    .host-only {
      border: 1px dashed #4b5563;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: #9ca3af;
    }
    .host-only strong {
      color: #e5e7eb;
    }
    .tagline {
      font-size: 0.9rem;
      color: #9ca3af;
    }
    .footer {
      margin-top: auto;
      padding: 0.75rem;
      font-size: 0.75rem;
      color: #6b7280;
      text-align: center;
    }
  </style>
</head>
<body>
<header>
  <h1>PeerBlocks</h1>
  <div class="tagline">Tiny Blooket‑style block race over PeerJS (host vs guest)</div>
</header>

<main>
  <section class="card" id="connection-card">
    <div class="row" style="justify-content: space-between;">
      <div>
        <label>Mode:</label>
        <select id="mode">
          <option value="host">Host game</option>
          <option value="join">Join game</option>
        </select>
      </div>
      <div>
        <label>Your name:</label>
        <input id="playerName" placeholder="e.g. Alex" />
      </div>
    </div>

    <div class="row" style="margin-top: 0.75rem;">
      <div id="hostControls">
        <button id="btnCreate">Create room</button>
        <span class="status" id="hostStatus"></span>
        <div class="small" id="roomInfo"></div>
      </div>

      <div id="joinControls" class="hidden">
        <label>Room ID:</label>
        <input id="joinId" placeholder="paste room id" />
        <button id="btnJoin">Join</button>
        <span class="status" id="joinStatus"></span>
      </div>
    </div>
  </section>

  <section class="card" id="game-card">
    <div class="scoreboard">
      <div class="score you">You: <span id="youScore">0</span></div>
      <div class="score them">Them: <span id="themScore">0</span></div>
    </div>
    <div class="question">
      <span class="tag">Question</span>
      <span id="questionText">Waiting for connection…</span>
    </div>

    <div class="host-only" id="hostPanel">
      <div><strong>Host tools</strong></div>
      <div style="margin-top: 0.25rem;">
        <label>Prompt:</label>
        <input id="qPrompt" placeholder="e.g. Click the biggest number" style="width: 100%; margin-top: 0.25rem;" />
      </div>
      <div style="margin-top: 0.25rem;">
        <label>Correct block index (1‑4):</label>
        <input id="qCorrect" type="number" min="1" max="4" value="1" style="width: 4rem;" />
      </div>
      <button id="btnNewRound" style="margin-top: 0.4rem;">Start new round</button>
      <span class="status" id="hostGameStatus"></span>
    </div>

    <div class="grid" id="blockGrid">
      <!-- 4 blocks -->
    </div>
    <div class="status" id="gameStatus"></div>
  </section>
</main>

<div class="footer">
  PeerBlocks – demo only, built with PeerJS CDN. Open in two browsers to play.
</div>

<!-- PeerJS CDN -->
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
  // --- Basic state ---
  let peer = null;
  let conn = null;
  let isHost = true;
  let myName = "";
  let myScore = 0;
  let theirScore = 0;
  let currentCorrectIndex = null;
  let roundActive = false;

  const modeSelect = document.getElementById("mode");
  const playerNameInput = document.getElementById("playerName");
  const hostControls = document.getElementById("hostControls");
  const joinControls = document.getElementById("joinControls");
  const hostStatus = document.getElementById("hostStatus");
  const joinStatus = document.getElementById("joinStatus");
  const roomInfo = document.getElementById("roomInfo");
  const btnCreate = document.getElementById("btnCreate");
  const btnJoin = document.getElementById("btnJoin");
  const joinIdInput = document.getElementById("joinId");

  const youScoreEl = document.getElementById("youScore");
  const themScoreEl = document.getElementById("themScore");
  const questionText = document.getElementById("questionText");
  const gameStatus = document.getElementById("gameStatus");
  const hostPanel = document.getElementById("hostPanel");
  const qPrompt = document.getElementById("qPrompt");
  const qCorrect = document.getElementById("qCorrect");
  const btnNewRound = document.getElementById("btnNewRound");
  const hostGameStatus = document.getElementById("hostGameStatus");
  const blockGrid = document.getElementById("blockGrid");

  // --- UI helpers ---
  function logStatus(el, msg) {
    el.textContent = msg || "";
  }

  function setScores() {
    youScoreEl.textContent = myScore;
    themScoreEl.textContent = theirScore;
  }

  function setQuestion(text) {
    questionText.textContent = text;
  }

  function setGameStatus(text) {
    gameStatus.textContent = text || "";
  }

  function setHostGameStatus(text) {
    hostGameStatus.textContent = text || "";
  }

  function clearBlocksState() {
    const blocks = blockGrid.querySelectorAll(".block");
    blocks.forEach(b => {
      b.classList.remove("correct", "wrong");
    });
  }

  function buildBlocks() {
    blockGrid.innerHTML = "";
    for (let i = 1; i <= 4; i++) {
      const div = document.createElement("div");
      div.className = "block";
      div.dataset.index = String(i);
      div.innerHTML = `
        <span class="label">Block ${i}</span>
        <span class="value">${i}</span>
      `;
      div.addEventListener("click", () => handleBlockClick(i));
      blockGrid.appendChild(div);
    }
  }

  function highlightResult(correctIndex, clickedIndex, isSelf) {
    const blocks = blockGrid.querySelectorAll(".block");
    blocks.forEach(b => {
      const idx = Number(b.dataset.index);
      if (idx === correctIndex) {
        b.classList.add("correct");
      } else if (idx === clickedIndex) {
        b.classList.add("wrong");
      }
    });
    if (isSelf) {
      setGameStatus("You answered first!");
    } else {
      setGameStatus("They answered first!");
    }
  }

  // --- Game logic ---
  function startNewRound(promptText, correctIndex) {
    currentCorrectIndex = correctIndex;
    roundActive = true;
    clearBlocksState();
    setQuestion(promptText);
    setGameStatus("Round active – click a block!");
  }

  function handleBlockClick(index) {
    if (!roundActive) return;
    if (!conn || conn.open !== true) {
      setGameStatus("Not connected.");
      return;
    }
    // Send answer to other side
    conn.send({
      type: "answer",
      index,
      name: myName
    });
    // Locally resolve if host; guest waits for host decision
    if (isHost) {
      resolveAnswer("self", index);
    } else {
      setGameStatus("Answer sent – waiting for host…");
    }
  }

  function resolveAnswer(who, index) {
    if (!roundActive) return;
    roundActive = false;
    const correct = currentCorrectIndex;
    const selfAnswered = who === "self";
    if (index === correct) {
      if (selfAnswered) {
        myScore++;
      } else {
        theirScore++;
      }
      setScores();
      highlightResult(correct, index, selfAnswered);
    } else {
      // wrong: other player gets point
      if (selfAnswered) {
        theirScore++;
      } else {
        myScore++;
      }
      setScores();
      highlightResult(correct, index, !selfAnswered);
    }
  }

  // --- PeerJS setup ---
  function ensureName() {
    const val = playerNameInput.value.trim();
    if (!val) {
      alert("Enter a name first.");
      return null;
    }
    return val;
  }

  function createPeer() {
    if (peer) return;
    peer = new Peer(undefined, {
      debug: 2
      // You can configure your own PeerJS server here if needed.
    });

    peer.on("open", id => {
      roomInfo.textContent = "Room ID: " + id + " (share this with your friend)";
      logStatus(hostStatus, "Room created. Waiting for player…");
    });

    peer.on("connection", c => {
      if (conn) {
        c.close();
        return;
      }
      conn = c;
      setupConnectionHandlers();
      logStatus(hostStatus, "Player connected!");
      setGameStatus("Connected! Host can start a round.");
    });

    peer.on("error", err => {
      console.error(err);
      logStatus(hostStatus, "Peer error: " + err.type);
    });
  }

  function joinPeer(roomId) {
    if (peer) return;
    peer = new Peer(undefined, { debug: 2 });

    peer.on("open", () => {
      logStatus(joinStatus, "Connecting to room…");
      conn = peer.connect(roomId);
      setupConnectionHandlers();
    });

    peer.on("error", err => {
      console.error(err);
      logStatus(joinStatus, "Peer error: " + err.type);
    });
  }

  function setupConnectionHandlers() {
    if (!conn) return;

    conn.on("open", () => {
      // Send intro
      conn.send({
        type: "hello",
        name: myName
      });
      if (!isHost) {
        logStatus(joinStatus, "Connected! Waiting for host to start.");
        setGameStatus("Connected! Host controls the rounds.");
      }
    });

    conn.on("data", msg => {
      if (!msg || typeof msg !== "object") return;
      switch (msg.type) {
        case "hello":
          // other side's name
          if (isHost) {
            setGameStatus("Connected to " + msg.name + ". Start a round!");
          } else {
            setGameStatus("Connected to host " + msg.name + ".");
          }
          break;
        case "round":
          // host sends new round
          currentCorrectIndex = msg.correctIndex;
          roundActive = true;
          clearBlocksState();
          setQuestion(msg.prompt);
          setGameStatus("New round! Click a block.");
          break;
        case "answer":
          // host receives guest answer
          if (isHost) {
            resolveAnswer("them", msg.index);
            // broadcast result to guest
            conn.send({
              type: "result",
              correctIndex: currentCorrectIndex,
              clickedIndex: msg.index,
              winner: (msg.index === currentCorrectIndex) ? "them" : "self"
            });
          }
          break;
        case "result":
          // guest receives final result from host
          roundActive = false;
          const winnerIsSelf = msg.winner === "self";
          if (winnerIsSelf) {
            myScore++;
          } else {
            theirScore++;
          }
          setScores();
          highlightResult(msg.correctIndex, msg.clickedIndex, winnerIsSelf);
          break;
      }
    });

    conn.on("close", () => {
      setGameStatus("Connection closed.");
      logStatus(hostStatus, "");
      logStatus(joinStatus, "Disconnected.");
    });
  }

  // --- Event wiring ---
  modeSelect.addEventListener("change", () => {
    isHost = modeSelect.value === "host";
    hostControls.classList.toggle("hidden", !isHost);
    joinControls.classList.toggle("hidden", isHost);
    hostPanel.classList.toggle("hidden", !isHost);
    setGameStatus(isHost ? "Host mode – create a room." : "Join mode – enter room ID.");
  });

  btnCreate.addEventListener("click", () => {
    const name = ensureName();
    if (!name) return;
    myName = name;
    isHost = true;
    createPeer();
    btnCreate.disabled = true;
  });

  btnJoin.addEventListener("click", () => {
    const name = ensureName();
    if (!name) return;
    const roomId = joinIdInput.value.trim();
    if (!roomId) {
      alert("Enter a room ID.");
      return;
    }
    myName = name;
    isHost = false;
    joinPeer(roomId);
    btnJoin.disabled = true;
  });

  btnNewRound.addEventListener("click", () => {
    if (!conn || conn.open !== true) {
      setHostGameStatus("No player connected.");
      return;
    }
    const promptText = qPrompt.value.trim() || "Click the correct block!";
    let correctIndex = Number(qCorrect.value);
    if (isNaN(correctIndex) || correctIndex < 1 || correctIndex > 4) {
      correctIndex = 1;
      qCorrect.value = "1";
    }
    startNewRound(promptText, correctIndex);
    conn.send({
      type: "round",
      prompt: promptText,
      correctIndex
    });
    setHostGameStatus("Round started.");
  });

  // --- Init ---
  buildBlocks();
  setScores();
  setQuestion("Choose host or join, then connect.");
  setGameStatus("Waiting for setup…");
</script>
</body>
</html>
